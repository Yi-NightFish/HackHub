{% for msg in messages %}
<div style="display: flex; flex-direction: column; margin-bottom: 12px; align-items: {% if msg.sender_id == current_user_id %} flex-end {% else %} flex-start {% endif %};">
    <div style="padding: 10px 15px; border-radius: 12px; border: 1px solid #ddd; max-width: 80%; background-color: {% if msg.sender_id == current_user_id %} #white {% else %} #f9f9f9 {% endif %};">
        <span style="color: #888; font-size: 0.8em;">
            {{ msg.timestamp.strftime('%Y-%m-%d %H:%M') }}
        </span>
        <br>
        <span style="font-weight: bold;">
            {% if msg.sender_id == current_user_id %}
                You:
            {% else %}
                User {{ msg.sender_id }}:
            {% endif %}
        </span> {{ msg.message }}
    </div>
</div>
{% endfor %}
