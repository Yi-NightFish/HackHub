<!DOCTYPE html>
<html>
<head>
    <title> Chat </title>
    <!-- <meta http-equiv="refresh" content="30"> -->
     <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>
    <h2> SIMPLE CHAT </h2>
    <div style="margin-bottom: 20px; padding: 15px; background-color: #f0f0f0; border-radius: 8px;">
    <strong>Chatting with: {{ other_user.name }}</strong>
    
    <span style="margin-left: 10px;">
        {% if other_user.is_online() %}
            <span style="color: #28a745;"> Online</span>
        {% else %}
            <span style="color: #888;"> Offline</span>
        {% endif %}
    </span>
</div>
    <div style="margin-bottom: 20px; padding: 10px; background-color: #f0f0f0; border-radius: 5px; display: flex; align-items: center; justify-content: space-between;">
        <div><strong>User: {{ current_user.name if current_user else "User" ~ current_user_id }}</strong></div>
    </div>
    <div style="font-size: 0.9em;">
        <a href="/profile/{{ current_user.id }}">My Profile</a> | 
        <a href="/logout">Logout</a> |
        <a href = "/clear"> Clear Chat </a> |
        <a href = "/chat/history"> Chat History </a>
    </div>
    
<div id="chatbox" style="border: 1px solid #ccc; padding: 15px; height: 60vh; overflow-y: scroll; background-color: #f9f9f9;" hx-get="/message?user_id={{ current_user_id }}" hx-trigger="load, every 3s" hx-target="#chatbox" hx-swap="innerHTML" hx-on::after-request="scrollToBottom()">
    {% include 'message.html' %}
</div>
<script>
    // 自动滚动到底部
    function scrollToBottom() {
        var chatbox = document.getElementById("chatbox");
        if (chatbox) {
            chatbox.scrollTop = chatbox.scrollHeight;
        }
    }
    window.onload = scrollToBottom; //页面加载时滚动到底部
    document.addEventListener("htmx:afterSwap", function(evt) {
        //only chatbox f5 will scroll to bottom
        if (evt.target.id === "chatbox") {
            scrollToBottom();
        }
    });
</script>
<form hx-post="/send_message" hx-target="#chatbox" hx-swap="innerHTML" hx-on:htmx:after-request="this.reset(); scrollToBottom();">
        <input type = "text" name = "message" placeholder = "Type message" style="width: 80%; padding: 10px;" required>
        <input type = "hidden" name = "user_id" value = "{{ current_user_id }}">
        <button type = "submit"> Send </button>
</form>
</body>
</html>
