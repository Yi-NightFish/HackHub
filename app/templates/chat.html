<!DOCTYPE html>
<html>
<head>
    <title> Chat </title>
    <meta http-equiv="refresh" content="5">
</head>
<body>
    <h2> SIMPLE CHAT </h2>
    <div>
    {% for msg in messages %} 
        <p> {{ msg.message }} </p>
    {% endfor %}
    </div>

    <form method ="POST" action="/send_message">
        <input type = "text" name = "message" placeholder = "Type message">
        <button type = "submit"> Send </button>
    </form>

    <br>
    <a href = "/clear"> Clear Messages </a>

</body>
</html>
