<!DOCTYPE html>
<html>
    <head>
        <title>{% block title %}{% endblock %}</title>
        <meta charset = "utf-8">
        {% block css %}
        {% endblock %}

        <style>
            body{
                margin: 0px;
                padding: 0px;
            }

            #navigation{
                background-color: #e1e1e1;
                height: auto;
            }

            #navigation a{
                padding: 20px;
            }

            a{
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <div id = "navigation">
            <a href = '{{url_for("home")}}'>Home</a>
            <a href = '{{ url_for("events") }}'>Events</a>
            {% if current_user %}
                <a href = '{{url_for("profile", user_id = current_user.id)}}'>Profile</a>
                <a href = '{{url_for("logout")}}'>Log Out</a>
            {% else %}
                <a href = '{{url_for("login")}}'>Login</a>
            {% endif %}
        </div>

        <div>
            {% block content %}
            {%  endblock %}
        </div>
    </body>
</html>
